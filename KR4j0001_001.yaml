body:
  text: 珠玉詞宋晏殊撰點絳唇露下風髙井梧宫簞生秋意畫堂筵啓一曲呈珠綴天外行雲欲去凝香袂爐煙起斷腸聲裏斂盡雙蛾翠浣溪沙舊刻十三闋考青杏園林煮酒香是永叔作今刪去閬苑瑶臺風露秋整鬟凝思捧觥籌欲歸臨别強遲留月好謾成孤枕夢酒闌空得兩睂愁此時情緒悔風流又三月和風滿上林牡丹妖豔直千金惱人天氣又春陰為我轉回紅臉面向誰分付紫臺心有情須殢酒杯深又向誤入南唐二主詞一曲新詞酒一杯去年天氣舊亭臺夕陽西下幾時回無可奈何花落去似曾相識燕歸來小園香徑獨徘徊又紅蓼花香夾岸稠緑波春水向東流小船輕舫好追遊漁父酒醒重撥棹鴛鴦飛去却回頭一杯銷盡兩睂愁又淡淡梳粧薄薄衣天仙模樣好容儀舊歡前事入顰睂間役夢魂孤燭暗恨無消息畫簾垂且留雙淚説相思又小閣重簾有燕過晚花紅片落庭莎曲闌干影入涼波一霎好風生翠幕幾回疏雨滴圓荷酒醒人散得愁多又宿酒才醒厭玉巵水沉香冷懶薰衣早梅先綻日邊枝寒雪寂寥初散後春風悠揚欲來時小屛間放畫簾垂又緑葉紅花媚曉煙黃蜂金蕊欲披蓮水風深處懶回船可惜異香珠箔外不辭清唱玉樽前使星歸覲九重天又湖上西風急暮蟬夜來清露濕紅蓮少留歸騎促歌筵為别莫辭金盞酒入朝須近玉爐煙不知重會是何年又楊柳陰中駐彩旌芰荷香裏勸金觥小詞流入管絃聲只有醉吟寬别恨不須朝暮促歸程雨條煙葉繫人情又一向年光有限身等間離别易銷魂酒筵歌席莫辭頻滿目山河空念逺落花風雨更傷春不如憐取眼前人又玉碗氷寒滴露華粉融香雪透輕紗晚來妝面勝荷花鬢嚲欲迎睂際月酒紅初上臉邊霞一場春夢日西斜清商怨向誤入歐集按詩話或問元獻公雁過南雲云云確是公作今增入關河愁思望處滿漸素秋向晚雁過南雲行人回淚眼雙鸞衾裯悔展夜又永枕孤人逺夢未成歸梅花聞塞管菩薩鬘芳蓮九蕊開新豔輕紅淡白勻雙臉一朵近華堂學人宫樣妝著時斟美酒共祝千年壽銷得曲中誇世間無此花又秋花最是黃葵好天然嫩態迎秋早染得道家衣淡妝梳洗時曉來清露滴一一金杯側插向緑雲鬟便隨王母仙乂人人盡道黃葵淡儂家解説黃葵豔可喜萬般宜不勞朱粉施摘取承金盞勸我千長算擎作女真冠試伊嬌面看又高梧葉下秋光晚珍叢化出黃金盞還似去年時傍欄三兩枝人情須耐久花面長依舊莫學蜜蜂兒等間悠揚飛訴衷情舊刻八首考海棠珠綴一重重是子瞻作今刪青梅煮酒鬬時新天氣欲殘春東城南陌花下逢著意中人回繡袂展香茵敘情親此時拚作千尺遊絲惹住朝雲又東風楊柳欲青青煙淡雨初晴惱他香閣濃睡撩亂有啼鶯睂葉細舞腰輕宿粧成一春芳意三月和風牽繫人情又芙蓉金菊鬬馨香天氣欲重陽逺村秋色如畫紅樹間疏黃流水淡碧天長路茫茫慿高目斷鴻雁來時無限思量又數枝金菊對芙蓉搖落意重重不知多少幽怨和露泣西風人散後月明中夜寒濃謝娘愁卧潘令間眠心事無窮又露蓮雙臉遠山睂偏與淡妝宜小庭簾幕春晚間共柳絲垂人别後月圓時信遲遲心心念念説盡無慿只是相思又秋風吹綻北池蓮曙雲樓閣鮮畫堂今日嘉會齊拜玉爐煙斟美酒祝芳筵奉觥船宜春耐夏多福莊嚴富貴長年又世間榮貴月中人嘉慶在今辰蘭堂簾幕高卷清唱遏行雲持玉盞斂紅巾祝千春榴花壽酒金鴨爐香嵗嵗長新採桑子春風不負東君信遍拆羣芳燕子雙雙依舊銜泥入杏梁須知一盞花前酒占得韶光莫話匆忙夢裏浮生足斷腸又紅英一樹春來早獨占芳時我有心期把酒攀條惜絳蕤無端一夜狂風雨暗落繁枝蝶怨鶯悲滿眼春愁説向誰又陽和二月芳菲遍暖景溶溶戲蝶遊蜂深入千花粉豔中何人解繫天邊日占取春風免使繁紅一片西飛一片東又櫻桃謝了梨花發紅白相催燕子歸來幾處風簾繡戶開人生樂事知多少且酌金杯管咽絃哀慢引蕭娘舞袖回又石竹古羅衣上金針樣繡出芳妍玉砌朱欄紫豔紅英照日鮮佳人畫閣新妝了對立叢邊試摘嬋娟貼向睂心學翠鈿又時光只解催人老不信多情長恨離亭滴淚春衫酒易醒梧桐昨夜西風急淡月朧明好夢頻驚何處高樓雁一聲又林間摘遍雙雙葉寄與相思朱槿開時尚有山榴一兩枝荷花欲綻金蓮子半落紅衣晚雨微微待得空梁宿燕歸酒泉子三月暖風開却好花無限了當年叢下落紛紛最愁人長安多少利名身若有一杯香桂酒莫辭花下醉芳茵且留春又春色初來遍被紅芳千萬樹流鶯粉蝶鬭翻飛戀香枝勸君莫惜縷金衣把酒看花須強飲明朝後日漸離披惜芳時望仙門紫薇枝上露華濃起秋風管絃聲細出簾櫳象筵中仙酒斟雲液仙歌轉繞梁虹此時佳會慶相逢慶相逢歡醉且從容又玉壺清漏起微涼好秋光金杯重疊滿瓊漿會仙郎新曲調絲管新聲更颭霓裳博山爐暖泛濃香泛濃香為壽百千長又玉池波浪碧如鱗露蓮新清歌一曲翠睂嚬舞華茵滿酌蘭英酒須知獻壽千春太平無事荷君恩荷君恩齊唱望仙門謁金門秋露墜滴盡楚蘭紅淚往事舊歡何限意思量如夢寐人貌老於前嵗風月宛然無異座有嘉賓樽有桂莫辭終夕醉清平樂春花秋草只是催人老總把千山睂黛掃未抵别愁多少勸君緑酒金杯莫嫌絲管聲催兔走烏飛不住人生幾度三臺又秋光向晚小閣初開宴林葉殷紅猶未遍雨後青苔滿院蕭娘勸我金巵殷勤更唱新詞暮去朝來即老人生不飲何為又春來秋去往事知何處燕子歸飛蘭泣露光景千留不住酒闌人散草草間階獨倚梧桐記得去年今日依前黃葉西風又金風細細葉葉梧桐墜緑酒初嘗人易醉一枕小窗濃睡紫薇朱槿花殘斜陽却照闌干雙燕欲歸時節銀屛昨夜微寒又紅箋小字説盡平生意鴻雁在雲魚在水惆悵此情難寄斜陽獨倚西樓遙山恰對簾鈎人面不知何處緑波依舊東流更漏子蕣華濃山翠淺一寸秋波如剪紅日永綺筵開暗隨仙馭來遏雲聲回雪袖占斷曉鶯春柳才送目又顰睂此情誰得知又塞鴻高仙露滿秋入銀河清淺逢好客且開睂盛年能幾時寶筝調羅袖軟拍碎畫堂檀板須盡醉莫推辭人生多别離又雪藏梅煙著柳依約上春時候初送雁欲聞鶯緑池波浪生探花開留客醉憶得去年情味金盞酒玉爐香任他紅日長又菊花殘梨葉墮可惜良辰虛過新酒熟綺筵開不辭紅玉杯蜀絃高羌管脆慢颭舞娥香袂君莫笑醉鄉人熙熙長似春相思兒令昨日探春消息湖上緑波平無奈繞堤芳草還向舊䀶生有酒且醉瑶觥更何妨檀板新聲誰教楊柳千絲就中牽繫人情又春色漸芳菲也遲日滿煙波正好豔陽時節爭奈落花何醉殺擬恣狂歌斷腸中贏得愁多不如歸傍紗窗有人重畫雙蛾喜遷鶯風轉蕙露催蓮鶯語尚綿蠻堯蓂隨月欲團圓真馭降荷蘭褰油幕調清樂四海一家同樂千官心在玉爐香聖壽祝天長又歌斂黛舞縈風遲日象筵中分行珠翠簇繁紅雲髻裊瓏璁金爐暖龍香逺共祝堯齡萬萬曲終休解畫羅衣留伴綵雲飛乂花不盡柳無窮應與我情同觥船一棹百分空何處不相逢朱絃悄知音少天若有情應老勸君看取利名場今古夢茫茫又燭飄花香掩爐中夜酒初醒畫樓殘笛兩三聲窗外月朧明曉簾垂驚鵲去好夢不知何處南園春色巳歸來庭樹有寒梅又曙河低斜月淡簾外早涼天玉樓清唱倚朱絃餘韻入疏煙臉霞輕睂翠重欲舞叉鈿搖動人人如意祝爐香萬壽百千長撼庭秋别來音信千里恨此情難寄碧紗秋月梧桐夜雨幾回無寐樓高目斷天遙雲黯只堪憔悴念蘭堂紅燭心長焰短向人垂淚胡搗練小桃花與早梅花盡是芳妍品格未上東風先拆分付春消息佳人叉上玉尊前朵朵穠香堪惜誰把彩毫描得免恁輕拋擲秋蕊香梅蕊雪殘香瘦羅幕輕寒微透多情只似春楊柳占斷可憐時候蕭娘勸我杯中酒翻紅袖金烏玉兔長飛走爭得朱顔依舊又向曉雪花呈瑞飛遍玉城瑶砌何人剪碎天邊桂散作瑶田瓊蕊蕭娘斂盡雙蛾翠回香袂今朝有酒今朝醉遮莫更長無睡滴滴金梅花漏泄春消息柳絲長草芽碧不覺星霜鬢邊白念時光堪惜蘭堂把酒留嘉客對離筵駐行色千里音塵便疏隔合有人相憶燕歸梁雙燕歸飛繞畫堂似留戀虹梁清風明月好時光更何况綺筵張雲衫侍女頻傾壽酒加意動笙簧人人心在玉爐香慶佳會祝筵長又金鴨香爐起瑞煙呈妙舞開筵陽春一曲動朱絃斟美酒泛􅘑船中秋五日風清露爽猶是早涼天蟠桃花發一千年祝長壽比神仙望漢月千縷萬條堪結占斷好風良月謝娘春晚先多愁更撩亂絮如雪短亭相送處長憶得醉中攀折年年嵗嵗好時節怎奈有人離别少年遊重陽過後西風漸緊庭樹葉紛紛朱闌向曉芙蓉妖豔特地鬭芳新霜前月下斜紅淡蕊明媚欲回春莫將瓊蕚等間分留贈意中人又霜華滿樹蘭凋蕙慘秋豔入芙蓉胭脂嫩臉金黃輕蕊猶自怨西風前歡往事當歌對酒無限到心中更慿朱檻憶芳容腸斷一枝紅又芙容花發去年枝雙燕欲歸飛蘭堂風軟金爐香暖新曲動簾帷家人拜上千春壽深意滿瓊巵緑鬢朱顔道家裝束長似少年時又謝家庭檻曉無塵芳晏祝良辰風流妙舞櫻桃清唱依約駐行雲榴花一盞濃香滿為壽百千春嵗嵗年年共歡同樂嘉慶與時新雨中花剪翠妝紅欲就折得清香滿袖一對鴛鴦眠未足葉下長相守莫傍細條尋嫩藕怕緑刺罥衣傷手可惜許月明風露好恰在人歸後迎春樂長安紫陌春歸早軃垂楊染芳草被啼鶯語燕催清曉正好夢頻驚覺當此際青樓臨大道幽會處兩情多少莫惜明珠百琲占取長年少紅窗聽淡薄梳粧輕結束天付與臉紅睂緑斷環書素傳情久許雙飛同宿一餉無端分比目誰知道風前月底相看未足此心終擬覓鸞絃重續又記得香閨臨别語彼此有萬重心訴淡雲輕靄知多少隔桃源無處夢覺相思天欲曙依前是銀屛畫燭宵長嵗暮此時何計託鴛鴦飛去睿恩新芙容一朵霜秋色迎曉露依依先拆似佳人獨立傾城傍朱檻暗傳消息靜對西風脈脈金蕊綻粉紅如滴向蘭堂莫厭重新免清夜微寒漸逼又紅絲一曲傍階砌珠露下獨呈纎麗剪鮫綃碎作香英分彩線簇成嬌蕊向晚羣花新悴放朵朵似延秋意待佳人插向叉頭更裊裊低臨鳯髻玉樓春東風昨夜回梁苑日腳依稀添一線旋開楊柳緑蛾睂暗折海棠紅粉面無情一去雲中雁有意歸來梁上燕有情無意且休論莫向酒杯容易散又簾旌浪卷金泥鳯宿醉醒來長懵鬆海棠開後曉寒輕柳絮飛時春睡重美酒一杯誰與共往事舊歡時節動不如憐取眼前人免使勞魂兼役夢又燕鴻過後鶯歸去細算浮生千萬緒長於春夢幾多時散似秋雲無覓處聞琴解佩神仙侣挽斷羅衣留不住勸君莫作獨醒人爛醉花間應有數又池塘水緑風微暖記得玉真初見面重頭歌韻響錚深入破舞腰紅亂旋玉鈎闌下香階畔醉後不知斜日晚當時共我賞花人點檢如今無一半又玉樓朱閣橫金鎖寒食清明春欲破窗間斜月兩睂愁簾外落花雙淚墮朝雲聚散真無那百嵗相看能幾箇别來將為不牽情萬轉千回思想過又朱簾半下香銷印二月東風催柳信琵琶旁畔且尋思鸚鵡前頭休借問驚鴻去後生離恨紅日長時添酒困未知心在阿誰邊滿眼淚珠言不盡又杏梁歸燕雙回首黃蜀葵花開應候畫堂元是降生辰玉盞更斟長命酒爐中百和添香獸簾外青蛾回舞袖此時紅粉感恩人拜向月宫千嵗壽又紫薇朱槿繁開後枕簟微涼生玉漏玳筵初啓日穿簾檀板欲開香滿袖紅衫侍女頻傾酒龜鶴仙人來獻壽歡聲喜氣逐時新青鬢玉顔長似舊又春蔥指甲輕攏撚五彩條垂雙袖捲雪香濃透紫檀槽胡語急隨紅玉腕當頭一曲情無限入破錚深金鳯戰百分芳酒祝長春再拜斂容擡粉面又紅條約束瓊肌穩拍碎香檀催急衮壠頭嗚咽水聲繁葉下間關鶯語近美人才子傳芳信明月清風傷别恨未知何處有知音長為此情言不盡鳯銜杯青蘋昨夜秋風起無限個露蓮相倚獨憑朱闌愁放晴天際空目斷遙山翠彩箋長錦書細誰信道兩情難寄可惜良辰好景歡娛地只恁空憔悴又留花不住怨花飛向南園情緒依依可惜倒紅斜向一枝枝經宿雨又離披憑朱檻把金巵對芳叢惆悵多時何況舊歡新寵阻心期滿眼是相思又柳條花纈惱青春更那堪飛緑紛紛一曲細絲清脆倚朱唇斟緑酒掩紅巾追往事惜芳辰暫時間留住行雲端的自家心下眼中人到處覺尖新踏莎行細草愁煙幽花怯露憑欄總是銷魂處日高深院靜無人時時海燕雙飛去帶暖羅衣香殘蕙炷天長不禁迢迢路垂楊只解惹春風何曾繫得行人住又祖席離歌長亭别宴香塵巳隔猶回面居人匹馬映林嘶行人去棹依波轉畫閣魂消髙樓目斷斜陽只送平波逺無窮無盡是離愁天涯地角尋思遍又碧海無波瑶臺有路思量便合雙飛去當時輕别意中人山長水逺知何處綺席凝塵香閨掩霧紅箋小字慿誰附高樓目盡欲黃昏梧桐葉上蕭蕭雨又緑樹歸鶯雕梁别燕春光一去如流電當歌對酒莫沉吟人生有限情無限弱袂榮春修蛾寫怨秦筝寶柱頻移雁樽中緑醑意中人花朝月下長相見又小徑紅稀芳郊緑遍高臺樹色陰陰見春風不解禁楊花濛濛亂撲行人面翠葉藏鶯朱簾隔燕爐香靜逐遊絲轉一場愁夢酒醒時斜陽却照深深院臨江仙資善堂中三十載舊人多是凋零與君相見最傷情一尊如舊聊且話平生此别要知須強飲雪殘風細長亭待君歸覲九重城帝宸思舊朝夕奉皇明蝶戀花舊七首考玉碗氷寒銷暑氣是子瞻作梨首葉疏紅蟬韻歇是永叔作今刪去又後二向另刻鵲踏枝考是一調今併入仍七首一霎秋風驚畫扇豔粉嬌紅尚折荷花面草際露垂蟲響遍珠簾不下留歸燕掃掠亭臺開小院四坐清歡莫放金杯淺龜鶴命長松壽逺陽春一曲情千萬又紫菊初生朱槿墜月好風清漸有中秋意更漏乍長天似水銀屛展盡遙山翠繡幕卷波香引穗急管繁絃共愛人間瑞滿酌玉杯縈舞袂南真祝壽千千嵗又一刻六一詞一刻東坡詞簾幕風輕雙語燕午醉醒來柳絮飛撩亂心事一春猶未見餘花落盡青苔院百尺朱樓間倚遍薄雨濃雲抵死遮人面消息未知歸早晚斜陽只送平波逺又六曲闌干偎碧樹楊柳風輕展盡黃金縷誰把鈿筝移玉柱穿簾海燕雙飛去滿眼遊絲兼落絮紅杏開時一霎清明雨濃睡覺來鶯亂語驚殘好夢無尋處又上二首或刻六一詞南雁依稀回側陳雪霽牆陰偏覺蘭芽嫩中夜夢餘消酒困爐香卷穗燈生暈急景流年都一瞬往事前歡未免榮方寸臘後花期知漸近寒梅已作東風信又向另刻鵲踏枝檻菊愁煙蘭泣露羅幕輕寒燕子雙飛去明月不諳離恨苦斜光到曉穿朱戶昨夜西風凋碧樹獨上高樓望盡天涯路欲寄彩箋無尺素山長水濶知何處又紫府羣仙名籍祕五色斑龍暫降人間媚海變桑田都不記蟠桃一熟三千嵗露滴彩旌雲繞袂誰信壺中别有笙歌地門外落花隨水逝相看莫惜尊前醉玉堂春帝城春暖御柳暗遮空苑海燕雙雙拂揚簾櫳女伴相攜共繞林間路折得櫻桃插髻紅昨夜臨明微雨新英遍舊叢寶馬香車欲傍西池看觸處楊花滿袖風又後園春早殘雪尚濛煙草數樹寒梅欲綻香英小妹無端折盡叉頭朵滿把金尊細細傾憶得往年同伴沉吟無限情惱亂東風莫便吹零落惜取芳菲眼下明又斗城池館二月風和煙暖繡戶珠簾日影初長玉轡金鞍繚繞沙堤路幾處行人映緑楊小檻朱闌回倚千花濃露香脆管清絃欲奏新翻曲依約林間坐夕陽漁家傲舊刻十四首考粉筆丹青描未得是六一詞刪去畫鼓聲中昏又曉時光只解催人老求得淺歡風日好齊喝調神仙一曲漁家傲緑水悠悠天杳杳浮生豈得長年少莫惜醉來開口笑須信道人間萬事何時了又荷葉荷花相間鬬紅驕緑掩新妝就昨日小池疏雨後鋪錦繡行人過去頻回首倚遍朱闌凝望久鴛鴦浴處波文皺誰喚謝娘斟美酒縈舞袖當筵勸我千長壽又荷葉初開猶半卷荷花欲折須微綻此葉此花真可羡秋水畔清涼緑映紅妝面美酒一杯留客宴拈花摘葉情無限爭奈世人多聚散頻祝願如花似葉長相見又楊柳風前香百步盤心碎點真珠露疑是水仙開洞府妝景趣紅幢緑蓋朝天路小鴨飛來稠閙處三三兩兩能言語飲散短亭人欲去留不住黃昏更下瀟瀟雨又葉下鵁鶄眠未穩風翻露颭香成陳仙女出遊知逺近羞借問饒將緑扇遮紅粉一掬蕊黃霑雨潤天人乞與金英嫩試折亂條醒酒困應有恨芳心易盡情無盡又罨畫溪邊停彩舫仙娥繡被呈新樣颯颯風聲來一餉愁四望殘紅片片隨波浪瓊臉麗人青步障風牽一袖低相向應有錦鱗間倚傍秋水上時時緑柄輕搖揚又宿蕊鬬攢金粉閙青房暗結蜂兒小斂面似啼還似笑天與貌人間不是鉛華少葉軟香清無限好風頭日腳乾催老待得玉京仙子到剛向道紅顏只合長年少又臉傅朝霞衣剪翠重重占斷秋江水一曲採蓮風細細人未醉鴛鴦不合驚飛起欲摘嫩條嫌緑刺間敲畫扇偷金蕊半夜月明珠露墜多少意紅腮點點相思淚又越女採蓮江北岸輕橈短棹隨風便人貌與花相鬪豔流水慢時時照影看妝面蓮葉層層張緑繖蓮房箇箇垂金盞一把藕絲牽不斷紅日晚回頭欲去心撩亂又粉面啼紅腰束素當年拾翠曾相過密意深情誰與訴空怨慕西池夜夜風兼露池上夕陽籠碧樹池中短棹驚微雨水泛落英何處去人不悟東流到了無停住又幽鷺慢來窺品格雙魚豈解傳消息緑柄嫩香頻採摘心似織條條不斷誰牽役粉淚暗和清露滴羅衣染就秋江色對面不言情脈脈煙水隔無人説似長相憶又上二首或入六一詞楚國細腰元自瘦文君膩臉誰描就日夜鼓聲催箭漏昏復晝紅顏豈得長依舊醉拆嫩房和蕊嗅天絲不斷清香透却傍小闌凝望久風滿袖西池月上人歸後又嫩緑堪裁紅欲綻蜻蜓點水魚遊畔一霎雨聲香四散風颭亂高低掩映千千萬總是凋零終有恨能無眼下生留戀何似折來妝粉面勤看玩勝如落盡秋江岸破陳子海上蟠桃易熟人間好月長圓惟有擘叉分鈿侣離别常多會面難此情須問天蠟燭到明垂淚薰爐盡日生煙一點凄涼愁絶意謾道秦筝有剩絃何曾為細傳又燕子欲歸時節高樓昨夜西風求得人間成小會試把金尊傍菊叢歌長粉面紅斜日更穿簾幕微涼漸入梧桐多少襟懷言不盡寫向蠻箋曲調中此情千萬重又憶得去年今日黃花巳滿東籬曾與玉人臨小檻共折香英泛酒巵長條插鬢垂人貌不應遷換珍叢又覩芳菲重把一尊尋舊徑所惜光陰去似飛風飄露冷時又湖上西風斜日荷花落盡紅英金菊滿叢珠顆細海燕辭巢翅羽輕年年嵗嵗情美酒一杯新熟高歌數闋堪聽不向尊前同一醉可奈光陰似水聲迢迢去未停瑞鷓鴣詠紅梅越娥紅淚泣朝雲越梅從此學妖嚬臘月初頭庾嶺繁開後特染姸華贈世人前溪昨夜深深雪朱顏不掩天真何時驛使西歸寄與相思客一枝新報道江南别樣春又江南殘臘欲歸時有梅紅亞雪中枝一夜前村間被瑶英拆端的千花冷未知丹青改樣勻朱粉雕梁欲畫猶疑何妨與向冬深密種秦人路夾仙溪不待夭桃客自迷殢人嬌二月春風正是楊花滿路那堪更别離情緒羅巾掩淚任粉䀶霑汙爭奈何千留萬留不住玉酒頻傾宿睂愁聚空腸斷寶箏絃柱人間後會又不知何處魂夢裏也須時時飛去又玉樹微涼漸覺銀河影轉林葉靜疏紅欲遍朱簾細雨尚遲留歸燕嘉慶日多少世人良願楚竹驚鸞秦箏起雁縈舞袖急翻羅薦雲回一曲更輕攏檀板香炷逺同祝壽期無限又一葉秋高向夕紅蘭露墜風月好乍涼天氣長生此日見人中喜瑞斟壽酒重唱妙聲珠綴鳳管移宫鈿衫回袂簾影動鵲爐香細南真寶籙賜玉京千嵗良會永莫惜流霞同醉連理枝玉宇秋風至簾幕生涼氣朱槿猶開紅蓮尚拆芙容含蕊送舊巢歸燕拂高簾見梧桐葉墜嘉宴臨晨啓金鴨飄香細鳯竹鸞絲清歌妙舞盡呈遊藝願百千遐壽比神仙有年年嵗嵗又緑樹鶯聲老金井生秋早不寒不暖裁衣按曲天時正好況蘭堂逢著壽筵開見爐香縹眇組繡呈纖巧歌舞誇妍妙玉酒頻傾朱絃翠管移宫易調獻金杯重疊祝長生永逍遙奉道長生樂玉露金風月正圓臺榭早涼天畫堂嘉會組繡列芳筵洞府星辰龜鶴福夀來添歡聲喜色同入金爐泛濃煙清歌妙舞急管繁絃榴花滿酌觥船人盡祝富貴又長年莫教紅日西晚留著醉神仙又閬苑神仙平地見碧海架蓬瀛洞門相向倚金鋪微明處處天花撩亂飄散歌聲裝真筵壽賜與流霞滿瑶觥紅鸞翠節紫鳯銀笙玉女雙來近彩雲隨步朝夕拜三清為傳王母金籙祝千嵗長生山亭柳贈歌者家住西秦賭博藝隨身花柳上鬬尖新偶學念奴聲調有時高遏行雲蜀錦纒頭無數不負辛勤數年來往咸京道殘杯冷炙謾消魂衷腸事託何人若有知音見採不辭遍唱陽春一曲當筵落淚重掩羅巾拂霓裳慶生辰慶生辰是百千春開雅宴畫堂高會有諸親鈿函封大國玉色受絲綸感皇恩望九重天上拜堯雲今朝祝壽祝壽數比松椿斟美酒至心如對月中人一聲檀板動一炷蕙香焚禱仙真願年年今日喜長新又喜秋成見千門萬戶樂升平金風細玉池波浪縠文生宿露霑羅幕微涼入畫屛張綺宴傍薰爐蕙炷和新聲神仙雅會會此日象蓬瀛管絃清旋翻紅袖學飛瓊光陰無暫住歡醉有間情祝辰星願百千為壽獻瑶觥又笑秋天晚荷花綴露珠圓風日好數行新雁貼寒煙銀簧調脆管瓊柱撥清絃捧􅘑船一聲聲齊唱太平年人生百嵗離别易會逢難無事日剩呼賓友啓芳筵星霜催緑鬢風露損朱顏惜清歡又何妨沉醉玉樽前珠玉詞
