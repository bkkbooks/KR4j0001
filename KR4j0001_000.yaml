body:
  text: 提要珠玉詞詞曲類一詞集之屬臣等謹案珠玉詞一巻宋晏殊撰殊有類要别著録馬端臨經籍考載殊詞有珠玉集一巻此本為毛晉所刻與端臨所記合蓋猶舊本名臣録亦稱殊詞名珠玉集張子野為之序子野張先字也今巻首無先序蓋傳冩佚之矣殊賦性剛峻而詞語特婉麗故劉攽中山詩話謂元獻善馮延巳歌詞其所自作亦不減延已趙與峕賔退録記殊幼子幾道嘗稱殊詞不作婦人語今觀其集綺艷之詞不少蓋幾道欲重其父名乃故作是言非確論也浣溪沙春恨詞無可奈何花落去似曽相識燕歸來二句乃殊示張寺丞王校勘七言律中腹聫復齋漫録嘗述之今復填入詞内豈自愛其造語之工故不嫌複用許渾集中一罇酒盡青山暮千里書回碧樹秋二句亦前後兩見知古人嘗有此例矣六一詞詞曲類一詞集之屬臣等謹案六一詞一巻宋歐陽修撰修有詩本義别著録其詞陳振孫書録解題作一巻此本為毛晉所刻亦止一巻而於六十家詞總目中注原本三巻蓋廬陵舊刻兼載樂語分為三巻晉刪去樂語仍併為一巻也曽慥樂府雅詞序有云歐公一代儒宗風流自命詞章窈眇世所矜式乃小人或作艷曲謬為公詞蔡絛西清詩話云歐陽詞之淺近者謂是劉煇偽作名臣録亦謂修知貢舉為下第舉子劉煇等所忌以辭蓬萊望江南詞誣之則修詞中巳雜他人之作又元豐中崔公度跋馮延已陽春録謂其間有誤入六一詞者則修詞又或竄入他集當在宋時已無定本矣晉此刻亦多所釐正然諸選本中有梅堯臣少年遊闌干十二獨凭春一首呉曽能改齋漫録獨引為修詞且云不惟聖俞君復二詞不及雖求之唐人温李集中殆難與之為一則堯臣已别有詞此詞斷當屬修晉未收此詞尚不能無所闕漏又如越溪春結語沈麝不燒金鴨玲瓏月照梨花係六字二句集内尚沿坊本誤玲為冷瓏為籠遂以七字五字為句是校讐亦未盡無訛然終較他刻為稍善故今從其本焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:dbec8aedf9a53a29e5f4b6f33789c45cf11c7d0f597d005baed486443667ba0d
